# Apache VirtualHost for landika.co.ke
# Reverse proxies to Next.js Docker container managed by Coolify
#
# Install: sudo cp apache-landika.conf /etc/apache2/sites-available/landika.conf
# Enable:  sudo a2ensite landika && sudo systemctl reload apache2
# SSL:     sudo certbot --apache -d landika.co.ke -d www.landika.co.ke

<VirtualHost *:80>
    ServerName landika.co.ke
    ServerAlias www.landika.co.ke

    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName landika.co.ke
    ServerAlias www.landika.co.ke

    # SSL will be configured by Certbot — placeholder
    # SSLEngine on
    # SSLCertificateFile /etc/letsencrypt/live/landika.co.ke/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/landika.co.ke/privkey.pem

    # Proxy to Coolify-managed Docker container
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Forward real client IP and protocol
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"

    # WebSocket support (for Next.js HMR in dev, and potential future use)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Cache static assets aggressively
    <LocationMatch "^/_next/static/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Cache images
    <LocationMatch "^/_next/image">
        Header set Cache-Control "public, max-age=86400"
    </LocationMatch>

    ErrorLog ${APACHE_LOG_DIR}/landika-error.log
    CustomLog ${APACHE_LOG_DIR}/landika-access.log combined
</VirtualHost>
